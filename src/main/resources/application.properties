# =====================================================
# SERVER CONFIGURATION
# =====================================================
server.port=8080
spring.application.name=ExchangeMingle-Backend

# =====================================================
# SUPABASE POSTGRES DATABASE
# =====================================================
spring.datasource.url=${SUPABASE_STRING}
spring.datasource.username=${SUPABASE_USERNAME}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# =====================================================
# CACHE
# =====================================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m


# =====================================================
# FILE UPLOAD
# =====================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


# =====================================================
# HIKARI CONNECTION POOL CONFIGURATION
# =====================================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# =====================================================
# JPA / HIBERNATE CONFIGURATION
# =====================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =====================================================
# SECURITY - JWT CONFIGURATION
# =====================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# =====================================================
# ERROR HANDLING
# =====================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# =====================================================
# ACTUATOR ENDPOINTS
# =====================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# =====================================================
# LOGGING CONFIGURATION
# =====================================================
logging.level.root=INFO
logging.level.com.exchangemingle.backend=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN



# =====================================================
# JACKSON JSON CONFIGURATION
# =====================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# =====================================================
# WEB CONFIGURATION
# =====================================================
spring.web.resources.add-mappings=false



# =====================================================
# BREVO EMAIL
# =====================================================
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=exchangemingle@gmail.com
brevo.sender.name=Exchange Mingle

# =====================================================
# CLOUDINARY
# =====================================================
cloudinary.cloud-name=djaasrmsg
cloudinary.api-key=${CLOUDINARY_APIKEY}
cloudinary.api-secret=${CLOUDINARY_APISECRET}

# =====================================================
# REDIS
# =====================================================
spring.data.redis.host=${REDIS_ENDPOINT}
spring.data.redis.port=${REDIS_PORTT}
spring.data.redis.password=${REDIS_PSW}
spring.data.redis.ssl.enabled=false

# =====================================================
# Livekit
# =====================================================
livekit.url=${LIVEKIT_URL}
livekit.api-key=${LIVEKIT_API_KEY}
livekit.api-secret=${LIVEKIT_API_SECRET}



# =====================================================
# FIREBASE
# =====================================================
firebase.service.account.base64=${FIREBASE_SERVICE_ACCOUNTKEY}


# =====================================================
# SPRINGDOC OPENAPI
# =====================================================
# Swagger/OpenAPI — disabled in production to prevent API exposure
# Re-enable locally by overriding in application-dev.properties
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false



# Spring Boot Admin isolated to /admin path - prevents it from intercepting /api/* routes
spring.boot.admin.context-path=/admin



# =====================================================
# TOMCAT TEMP DIR FIX (Windows)
# =====================================================
server.tomcat.basedir=${java.io.tmpdir}